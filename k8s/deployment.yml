apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-mastery-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitops-mastery
  template:
    metadata:
      labels:
        app: gitops-mastery
    spec:
      containers:
        - name: practice-container
          image: ghcr.io/craztool/gitops-mastery:452270bfaa8cd9f9b8a954949490ee2c897f9bd9
          ports:
            - containerPort: 8080