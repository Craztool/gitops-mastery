apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-mastery-deployment
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gitops-mastery
  template:
    metadata:
      labels:
        app: gitops-mastery
    spec:
      containers:
        - name: practice-container
          image: ghcr.io/craztool/gitops-mastery:05333dd266f14616399b56c5fc7e9f597fab00dd
          ports:
            - containerPort: 8080