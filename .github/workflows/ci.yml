name: CI

on: [push]

jobs: 
    build-and-push:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
        
        steps:
            - name: Copy code
              uses: actions/chekout@v4

            - name: Login in ghcr.io
              uses: docker/login-action@v3
              with:
                registry: ghcr.io
                username: ${{ github.actor}}
                password: ${{ secrets.GITHUB_TOKEN }}
            
            - name: Build and push
              uses: docker/build-push-actions@v6
              with:
                context: .
                push: true
                tags: |
                    ghcr.io/${{ github.actor }}/gitops-mastery:latest
                    ghcr.io/${{ github actor }}/gitops-mastery:${{ github.sha }}

                